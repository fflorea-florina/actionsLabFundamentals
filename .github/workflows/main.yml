name: My First Workflow
on: 
  push:
    branches: [main]
    paths-ignore: [.github/**]
  schedule:
    - cron: "1,31 8-18 * * 1-5"
  workflow_dispatch: 

jobs:
  First-Job:
    runs-on: ubuntu-latest
    permissions: read-all
    steps:
      - run: |
          echo "This job was triggered by ${{ github.event_name }}"
          echo "Branch name is ${{ github.ref }} and repository is ${{github.repository}}."
          echo "Triggered by: ${{github.actor}} using ${{ github.event_name }} ">> $GITHUB_STEP_SUMMARY
      - uses: actions/checkout@v7.0.0  
      
      - name: List repo files
        run: |
          echo "${{github.repository}} contains:"
          echo "::group::Directory Structure"
          tree . -L 5
          echo "::endgroup::"
          echo "::group::Github object"
          echo "${{ toJson(github) }}"
          echo "::endgroup::"         


workflow_dispatch:
  inputs:
      environment:
        description: 'Environment to deploy to'
        type: environment
        required: true

  Test:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: Build
    environment: Test
    steps:
      - run: echo "🧪 Testing..."

  Load-Test:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: Build
    environment: Load-Test
    steps:
      - run: |
          echo "🧪 Testing..."
          sleep 15

  Production:
    runs-on: ubuntu-latest
    needs: [Test, Load-Test]
    environment:
      name: Production
      url: https://writeabout.net
    if: github.event.inputs.environment == 'Production'
    steps:
      - run: |
          echo "🚀 Step 1..."
          sleep 10
      - run: |
          echo "🚀 Step 2..."
          sleep 10
      - run: |
          echo "🚀 Step 3..."
          sleep 10
      - run: |
          echo "🚀 Step 4..."
          sleep 10
      - run: |
          echo "🚀 Step 5..."
          sleep 10
